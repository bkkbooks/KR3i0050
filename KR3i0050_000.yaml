body:
  text: 異魚圖贊補譜録類三草木禽魚之屬提要臣等謹案異魚圖贊補三卷閏集一卷國朝胡世安撰世安有大易則通已著録是書乃其未第時所作以楊慎異魚圖贊尚多所闕漏因摭其遺脱作為此編凡魚類補一百五十四種為贊五十七首海錯類補三十八種為贊二十八首又閏集一卷魚三十餘種冠以摩竭海多非常之魚亦各為之贊而其子璞及其門人雷琯等共加箋釋閏集所載與目録多不相應前後舛互贊文亦徃徃闕佚疑當日修改未竟之本也慎之作贊雖属文人㳺戲之筆而源出郭璞要自古雋可觀世安續加仿傚其徵据典博亦不失為馴雅與慎書相輔以行於水族品目亦畧備矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:bb4f79655ade80b0917de95a6a6f2f240b2b5138669a1e16d7f30c0b6bde7f3d
