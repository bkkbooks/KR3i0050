body:
  text: 異魚圖贊補卷上明胡世安撰鯔魚鯔魚肖鯉産淺海㵝非鱭非鰦音峕混系首匾身圓骨軟肉細大者號蜛子味靡儷雨航雜録鯔魚似鯉生淺海中專食泥身圓口小骨軟肉細似鯔而大者曰蜛神仙傳介象與吳王共論魚以鯔為上取其益隂張九嵕頌駕青虬驂玄螭肥而癡涅而淄似烏則比黑魚不嫌入淤而食泥猶堪哺糟與啜醨養魚經松之人於潮泥地鑿池仲春潮水中捕鯔盈寸者養之秋而盈尺腹背皆腴為池魚之最是食泥與百藥無忌其子味更佳京口録云頭匾而骨軟惟喜食泥色緇黑故名粵人訛為子魚閩志云目赤而身圓口小而鱗黑至冬能牽被而自藏李時珍云生東海狀如青魚長者尺餘其子滿腹有黃脂味美獺喜食之吳越人以為佳品醃作鮝臘齊諧記魏明帝見雒水白獺不可得徐邈曰獺嗜鯔魚不避死乃刻畫板作鯔形懸於岸羣獺競來一時執得鰦魚出餘姚子鱭魚出山隂青脊魚青脊非鯽而有鯽名身扁鱗白腴美可鯖清明時候腦內蝨生肉瘦味減不中煿烹海味索隱青鯽歌探茅積得玄鯽顔如漆味如臘煮白石防中咽啖蟠桃吐崑核比五葷是雞肋中間棄之殊可惜屠本畯云青脊魚身扁而鱗色俱白以背上一條青脊得名非青鯽魚也其膏腴甚美出秦化縣士庶咸珍之在諸魚之上過清明時候腦中生蟲名魚蝨其蝨漸大而魚亦漸瘦便不堪食矣豈張將軍食此魚正在生蝨時耶但脊作鯽土人故自訛耳漁書黃魚狀似鰣魚而小一名青鯽寧波出者佳鱗薄刺柔海人尚之香魚鴈珍維五香魚殿供丰美拔萃五斗曷庸月增一寸自春徂冬雨航雜録鴈山五珍謂龍湫茶觀音竹金星草山樂官香魚也士人朱太守素無宦情嘗曰豈以五斗易五珍香魚鱗細不腥春初生月長一寸至冬月長盈尺則赴潮際生子生已輒稿惟鴈山溪澗有之他無有也一名記月魚墨頭魚墨鱸類鯶出以三月漁火夜伺其來勃窣好事相傳墨瀋攸淈墨頭魚屬嘉州出形狀類鯶子長者及尺其頭黑如墨頭上有白子二枚又名北斗魚常以二三月出漁人以火夜伺叉之惟郭璞臺前乃有世傳璞著書臺上魚吞洗硯之墨所化或名墨鱸方物略云黑頭魚形若鯶長者及尺出嘉州歲三月則至惟郭璞臺前有之里人欲怪其説則言璞著書臺下魚吞其墨故首黑贊曰黑首白腹修體短額春則羣泳促罟斯獲嘉州又有客朗魚似鰣肉嫩而美不恆有也馬嘉魚福之馬嘉燕尾銀膚春夏乳子始與潮徂知進退見束罧𦌬癸辛雜識姚鎔效柳河東三戒作三説其一曰福之馬嘉云海有魚曰馬嘉銀膚燕尾大者視晬兒臠而火鱐之可致遠常淵潛不可捕春夏乳子則隨潮出沒而上漁者用此時簾而取之簾為疏目廣袤數十尋雨舟引張之縋以鐵下垂水底魚過者必鑽觸求進愈束愈怒則頰張鬛舒鈎著其目致不可脫向使觸網而能退却則悠然逝矣知進而不知退用罹烹醢之酷悲夫鯈䱁浮陽之魚名曰鯈䱁狀如柳葉羣遊發發胠沙望洋有懷莫豁省枯魚書徒增嗟咄荀子鯈音稠䱁當作鮁者浮陽之魚也胠袪同於沙而思水則無逮矣挂於患而欲謹則無益矣本草名鰷魚一名𩽐魚一名鮂魚條其狀也粲其色也囚其性也李時珍云生江湖中小魚長僅盈寸形狹而扁狀如柳葉鱗細而整潔白可愛性好羣遊最宜鮓菹鮸魚腮有三四倣佛淞鱸雖有鰵名與􅀈類殊雨航雜録鮸魚狀似鱸而肉粗三腮曰鮸四腮曰茅鮸樂清志所謂鰵音敏魚是也一曰茅狂林日瑞漁書云鮸狀如石首而大色黑多鱗巨者鱗如海鏡眼如碗重數十斤生深海中可脯可醢其膠絶堅美工師為几案諸器物常用之篇海􅀈鱝同音憤即鰵也此魚圓如盤口在腹下尾有毒此似另種互見黃魟箋杜父魚溪澗小魚爰有杜父狀類吹沙口濶喙砮脊鬐雖螫渡父攸膴杜父魚一名渡父魚一名黃䱂音么魚一名船矴魚臨海志名伏念魚古今注江東呼童子魚為土父是也李時珍云溪澗小魚渡父所食故名見人則以喙插入泥中如船矴也陳藏器云杜父魚生溪澗中長二三寸狀如吹沙而短其尾岐大頭澗口其色黃黑有班脊背上有鬐刺螫人勒魚東南海中夏初謖謖漁人設網伺鰳次逐狀刺如鰣氷鮮是鬻甜瓜若生骨蒂尋熟本草此魚腹有硬刺勒人故名出東南海中以四月至漁人設網候之聽水中有聲則魚至矣有一次二次三次乃止狀如鰣魚小首細鱗腹下有硬刺如鰣腹之刺頭上有骨合之如鶴喙形乾者謂之勒鮝吳人嗜之甜瓜生者用勒鮝骨插蒂上一夜便熟石首鮝骨亦然養魚經鰳魚腹下之骨如鋸可勒出與石首同時海人以氷養之而鬻於諸郡謂之氷鮮沉虎潛鹿惟海蠻師魚身虎首爰彼潛鹿亦班龍偶變化無恆孰是樞紐談乘沉虎虎頭魚也潛鹿鹿頭魚也互見前鮫箋夢溪筆談嘉祐中海中漁人獲一物魚身而首如虎亦作虎文有兩短足在肩指爪皆虎長八九尺視人輒淚下舁至郡中數日方死有父老云昔年曾見之謂之海蠻師然書傳小説未嘗載臨海水土異物志鹿頭魚有兩角如鹿又雷州出虎鯊鹿鯊電白海中有鹿魚梅聖俞有鹿角魚詩海中魚角矗矗不擬龍乃擬鹿嶺表録異鹿子魚頳色其尾鬛皆有鹿班赤黃色羅州圖經云州南海中有洲每春夏此魚跳出洲化而為鹿曾有人拾得一魚頭已化鹿尾猶是魚南人云魚化為鹿肉腥不堪食黃魟魚魚曰黃魟音烘身似槲葉頭尖無鱗末刺堪懾酉陽雜俎黃魟魚色黃無鱗頭尖身似大槲葉口在頷下眼後有耳竅通於腦尾長一尺有三刺甚毒雨航雜録魟魚形圓似扇無鱗色紫黑口在腹下尾長於身如狸鼠其最大曰鮫其次曰錦魟曰黃魟曰斑魟曰牛魟曰虎魟魟或作䱋文選所謂鱝魚也尾端有刺甚毒大抵海魚性尤熱於諸魚不可常餐油魚河首石穴油魚所裔三寸而修豈魟之儷肥以中秋炙食腴毳油魚在雲南鄧川州南上有珥池又五里為油魚穴魚長僅二三寸中秋則肥孟冬則絶沮水記云河首關有石穴八九月産油魚甚肥人謂水鹹則然油魚視魟魚更小而肥美過之炙則腴毳黃鯝魚黃鯝小魚身扁鱗白闊不踰寸長不近尺可充胙菹宜於煿炙黃姑黃骨呼訛南北本草黃鯝魚生江湖中小魚也狀似白魚而頭尾不昻扁身細鱗白色濶不踰寸長不近尺可作鮓菹煎炙甚美按魚腸肥曰鯝此魚腸腹多脂漁人煉取黃油然燈甚腥南人訛呼黃姑魚北人訛呼黃骨魚白魚北勝陳海白魚是育江湖類生太湖擅獨鱎鮊殊稱武舟戬榖雄詮魾名崔豹有録一統志白魚出雲南北勝州陳海狀如鯉而色白又淮水出白魚和州出淮白魚避暑録太湖之白魚冠天下梅雨後十有五日入時白魚最盛謂之時裏白本草亦作鮊一名鱎魚白者色也喬者頭尾向上也劉翰云生江湖中頭昻大者長六七尺李時珍云鮊形窄腹扁鱗細頭尾俱向上肉中有細刺武王白魚入舟即此古今注白魚雄者曰魾子好羣浮水上名白萍陽鱎迎釣輒吞陽鱎則爾肉懆無味質薄不美譬彼冠蓋前塵倒屣賢哲烹鮮云胡不鄙説苑宓子賤為單父宰過陽晝曰子亦有以送僕乎陽晝曰夫投綸錯餌迎而吸之者陽鱎也其為魚薄而不美若存若亡若食若不食者魴也其為魚博而肉厚子賤曰善未至單父冠蓋迎之者交接於道子賤曰車驅之車驅之夫陽晝之所謂陽鱎者至矣於是請耆老尊賢者而與之共治白鰱魚之貴者爰有白鰱納池白露違時則脧養魚經曰鰱乃魚之貴者白露左右始可納之池中或前一月或後一月皆不育漁人攜於舟若煎炙油氣觸之則目瞎京口録云巨首細鱗池塘中多畜之鯼魚魚叨類者江湖有鯼志訛石首食療混鯮其實三種稍有異同李時珍云鯼性啖魚其目䁓視故名異物志作石首非也食療作鯮鯮生江湖中體圓厚而長似鱤魚而腹稍起扁額長喙口在頷下細鱗腹白背微黃色亦能噉魚大者二三十斤䰵魚閩莆有䰵鮮食朵頤剖腹子滿玄冬佳時王得臣麈史䰵魚閩中鮮食最珍者長七八寸濶二三寸剖之子滿腹冬日正其佳時莆田迎仙鎮乃其出處黃公度云莆中佳産惟子魚紫菜荔枝蠣房也宋方勻泊宅編興化軍子魚惟通應大師廟前者最美世稱通應子魚而東坡詩通應子魚猶帶骨應作印恐誤漁書子魚似青魚而小正二月間佳此種海上多有之惟鹹淡水之交其品獨擅又有赤鮌白鮌大同小異海人能辨之臨安只子魚一種大則鯔魚也生江中者勝他産類説秦檜夫人嘗春日入宫顯化太后言近日子魚大者絶少夫人曰妾家有之當以百尾進歸告檜咎其失言乃謀之客以青魚進后撫掌大笑云我道這婆子村果然印魚首載篆籀注諸魚死似青而修捕必先祀勝鶚炙者彼或疑此雜俎印魚長一尺三寸額上四方如印有字諸大魚應死者先以印封之明黃鐵橋海語印魚出南海中似青魚而修廣過之頭骨中拆如解顱之嬰腦後垂皮方徑三寸許若道巾之披餘然上有黑文儼如篆籀島夷間有獲者必珍藏之述異記城陽縣南有堯慶都墓前一池魚頭間有印文謂之印頰魚若非祀者捕而不得郭祥正詩仙魚通印勝鶚炙亦猶蘇之誤也井魚井魚腦穴噴水濺濺經其吸吐變海而泉雜俎井魚腦有穴每翕水輒於腦穴蹙出如飛泉散落海中舟人競以空器貯之海水鹹苦經魚腦穴出反淡如泉水焉成式見梵僧善提勝説毛魚南海洞穴隂源下通中有毛魚與龍同宮髤䰄頷豪可貼屏風拾遺記南潯之國有洞穴隂源其下通地脈中有毛龍毛魚同穴而處續博物志海州有人持一束黑物形如竹篾云海魚腮中毛可作屏風貼色似水牛角頭似豬鬃長二尺四寸廣可一寸針魚喙有針紋字曰針魚形同鱠殘疫疾同除釣針所化俗説堪唹本草作鱵臨海志作銅哾魚東山經栒牀山􅯤水出焉北注於湖中多針魚狀如鯈其喙如針食之無疫疾寰宇記鱵魚生江湖中大小形狀并同鱠殘但喙尖有一細黑骨如針是異耳俗云薑太公釣針所化又名薑公魚志吳江出針口魚首載針芒身長五六寸土人多取充鱐鮊鮮魚鮊鮮之魚體薧中薄滇澄所饒市充瘴藥一統志􅊹江府河陽縣出舶鮮魚一名康郎魚雲南諸府買作瘴藥一作漮㝗注漮㝗空貌今此魚亦乾而中空􅤤魚􅤤魚無骨臑膩如膏徒哆厥口不足以豪雨航雜録􅤤魚身柔如膏無骨鱗細口濶齒多一作䱠海上人目人弱者曰􅤤海味索隱頌豐若無􅡌柔若無骨截之肪耶盡之脂耶乳沉雪山鉢底酥凝玉門關外露滴仙盤掌中其即若箇之化身也耶四明屠本畯云水族風味真上品也一作風􅀈半湯魚半湯湖魚互入輒死亦如鰌鱔不入江水一統志應天府東北有半湯湖水同一壑而冷熱相半熱可瀹雞中皆有魚魚交入輒死民引熱水溉田一歲再熟埤雅鰌鱔入江水輒死韓文公詩江魚不池活今魚生流水中則背鱗白而味美生止水中則背鱗黑而味惡亦一驗曹植云鹹水之魚不遊於江淡水之魚不入於海風雨魚海鷂風使白袋雨奴性同箕畢羽角形殊雨航雜録海鷂魚亦文鰩類也形似鷂有肉翅能飛上石頭齒如石板出主風又有白袋魚似牛而白自海入江則兆水澤謡曰海鷂風伯使白袋雨師奴釋名海鷂魚一名邵陽魚食鑑作少陽魚一名荷魺同魚一名鱝魚一名鯆魮魚一名蕃踏魚一名石蠣陳藏器云生東海尾有大毒逢物以尾撥而食之其尾刺人三刺中之者死二刺者困一刺者可以救候人溺處刺釘之令人隂腫痛拔去乃愈海人被刺毒者以魚扈竹及海獺皮解之又有鼠尾魚地青魚並生南海俱有肉翅刺在尾中食肉去刺李時珍云海鷂魚江湖亦時有之狀如盤及荷葉大者圍七八尺無足無鱗背青腹白口在腹下目在額上尾長有節螫人最毒皮色肉味俱同鮎魚肉內皆骨節節聮比脆軟可食吳人臘之魏武食制蕃踏魚大者如箕尾長數尺是已即漳泉所謂􅀈魚嶺表録異雞子魚嘴形如鷂肉翅無鱗色類鮎魚尾尖而長有風濤即乘風飛於海上此亦海鷂類也南越記天牛魚方圓三丈眼大如斗口在脅下露齒無脣兩肉角如臂兩翼長六尺尾長五尺或亦白袋類也海燕魚魚有海燕大小種殊聲如牛者矯然潮驅以寸計者隂雨翔區廣古今五行記齊鹽官縣石浦有海魚乘潮來去長三十餘丈黑色無鱗其聲如牛土人呼為海燕本草海燕出東海大一寸狀扁面圓背上青黑腹下白脆似海螵蛸有紋如簟茵口在腹下食細沙口旁有五路正勾即其足也臨海水土記陽遂足生海中色青黑腹白有五足不知頭尾生時體耎死即乾脆正此異物志載燕魚長五寸隂雨則飛起亦即此主治隂雨發損痛亦入滋陽藥鬬魚有魚矯悍斑紋炫盼習訓爭長里兒競豢宋張世南遊宦記聞三山溪中産小魚斑紋赤黑相間里中兒豢之角勝負為博戲昔有鬬禽未見有鬭魚亦可觀也聞永嘉亦有之稗史波師魚俗名師婆魚其大如指鬐鬛具五采兩腮有小點如黛性矯悍好與魚鬭五雜組閩莆中喜鬭魚其色斕斒喜鬭纒繞終日尾盡齧斷不解此魚吾郡亦有之俗名錢爿魚畜之盆中諸魚無不受齧人皆惡之而莆人乃珍重如許良可怪也毒魚虢師越龜及籬頭溺人中厥毒亦孔之戚北山經饒山歷虢之水出焉東注於河中有師魚食之殺人陳藏器云魚師大者有毒殺人今無識者但唐韻鰤老魚也及北山經所云其即此與南越志繢尾魚有毒一名龜魚酉陽雜俎傍海大魚脊上有石十二一名籬頭溺一名螃􅲶其溺甚毒異魚圖贊補卷上
