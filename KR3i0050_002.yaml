body:
  text: 異魚圖贊補卷中明胡世安撰珠蟞魚珠蟞足六如肺有目瘳癘若逐甘酸盈掬東山經葛山灃水出焉東注於余澤中多蟞蟞魚其狀如肺而有目六足有珠其味酸甘食之無癘一統志生高州海中四目六足而吐珠呂氏春秋灃水魚之美者名曰珠鱉淮南子蛤蟹珠鱉與月盛衰埤雅鱉珠在足皆指此也茈魚泚水茈魚一首十身臭越蘪蕪失氣以踆東山經東始山泚水出焉中多茈魚狀如鮒一首而十身其臭如蘪蕪食之不䊧孚注止失氣也按朔法師混作鮆魚非鯥魚鯥好陵居魼羽蛇尾音如留牛夏生冬死南山經杻陽山之東柢音蒂山多水有魚焉狀如牛陵居蛇尾有翼其羽在魼亦作脅下其音如留牛名曰鯥冬死而夏生食之無腫疾赤鱬即翼赤鱬是醫疥瘃人面鳥音茜質漾淥比之陵魚而無手足篇海作鮢鱬南山經青丘山英水出焉南注即翼之澤中多赤鱬其狀如魚而人面音如鴛鴦食之不疥海內北經陵魚人面手足魚身在海中鱄魚鱄音團狀􅀢鮒音毛竊豚不利於見䗤薄之倫南山經雞山黑水出焉南注於海中有鱄魚狀如鮒而彘毛音如豚見則天下大旱東山經獨山末塗之水出焉東南注沔中多䖺䗤狀如黃蛇魚翼出入有光見則其邑大旱又女蒸山膏水出焉西注干鬲水中多薄魚狀如鱣而一目其音如歐謂如人嘔吐聲見則天下大旱修辟魚黽形鴟聲維喙則白功埒豪魚厥名修辟中山經槖山槖水出焉北注於河中多修辟之魚狀如黽而白喙其音如鴟食之已白癬又渠豬山之水中多豪魚狀如鮪赤喙尾赤羽可以已白癬鯩魚鯩魚貌鮒其文則黑希夷先生或不薦食中山經來需之水出於半石山陽而西注於伊中多鯩魚黑文其狀如鮒食者不睡莽魚莽魚形大龜首鱉身患劇鵜獺性最不仁中山經槐水之河有莽魚其形至大龜首鱉身是河內所出魚盡皆食之䰷魚招水源禺䰷厥府藏魚尾兩足狀鱉音羊西山經英山禺水出焉北注於招水中多䰷魚狀如鱉音如羊郭注狀如龜而魚尾二足螺魚濛水注洋有螺泳斯音鴦翼鳥陽侯是毗西山經邽山濛水出焉南注於洋中多螺音螺玉篇作嬴魚魚身而鳥翼見則其邑大水鰠魚鰠魚渭産其狀如鱣覯等朱獳休䱱代蠲西山經鳥鼠同穴之山渭水出焉東注於河中多鰠魚動則其國有大兵東山經耿山有獸狀如狐而魚翼名曰朱獳其鳴自呌見則其國有恐中山經少室之山休水出焉北注於雒中多䱱魚狀如盩蜼而長距足白而對食者無蟲疾可以禦兵冉遺魚北注陵羊是曰涴水誕育冉遺目如馬耳蛇首六足朋䱱侶鮪捐􅀈禦凶山經稱美西山經英鞮山涴水出焉北注陵羊之澤多冉遺或作髯可以禦凶鯈音猷魚汨和損平莫慘於憂詩詠萱草山經則鯈舊贊北山經帶山茈湖之水其中多鯈魚狀如雞而赤色三尾六足四首其音如鵲食之已憂一云亦可以禦火或謂萱草二句應改云霍山朏朏茈水則鯈更切按中山經霍山有獸狀如狸而白尾有鬛名曰朏朏食之可以已憂滑魚䲃魚諸毗有滑泰澤有䲃已疣功並宜用充庖北山經求如山滑水出焉西注於諸毗之水中多滑魚狀如鱓赤背其音如梧食之已疣又獄法山瀼澤之水出焉東北注於泰澤中多䲃魚狀如鯉而雞足食之已疣又展水鱃魚亦已疣見前鮨音詣魚囂水鮨魚兒音犬首琴牧而存吾以薦酒北山經北獄山諸懷之水出焉西注於囂水中多鮨魚魚身而犬首音如嬰兒食之已狂化魚鱗而毛羽黃魚化鵡泡變豪豬沙魚更虎倦遊雜記黃魚化為鸚鵡泡魚大者如斗身有刺化為豪豬沙魚之斑者化為虎臨海記魚虎名土奴魚陳藏器云生南海頭如虎背皮如猬有刺著人如蛇咬能化豪豬亦有變虎者海語虎頭鯊化虎惟四足難化經月乃成或曰虎文直而疏且長者鯊化也炳炳成章者常虎也逆鱗魚魚逆鱗者仙經肉芝詭質殊育明逺志之瑣碎録魚逆水而上鳥向風而立取其鱗羽之順也按紀聞逆鱗魚仙經謂之肉芝鮑照登雷岸與妹令暉書繁化殊育詭質怪章則有芒須針尾之族逆鱗反舌之屬無鱗魚黃帝遊雒見鯉無鱗其長三丈赤文青身河圖黃帝遊於雒見鯉魚長三丈青身無鱗赤文成字西寧衛志城西三百里外有西海方數百里中有魚無鱗背負黑點二名魚二名之魚篇海可披鰚􅀈􅱚䱮音革額鯌豫􅱈鯕䰸蜇􅀈音姶鱂􅀈􅀈音納哈鮪魪音癡蒲夷堪㐨音序山經攸垂以上魚皆兩字名不及特表者鯌豫魚其生也帶子䰸蜇海魚􅀈鱂魚似鰿而小北山經碣石繩水出焉東注於河中多蒲夷之魚東山經豺山其下多水中多堪㐨之魚其餘形色地産未詳復名魚魚復名者鰼鰼鱅鱅䰽䰽鮯鮯蠻蠻禺禺音顒鰼鰼鮯鮯見前東山經􅈪􅪳山食水出焉中多鱅鱅之魚其狀如犂牛其音如彘鳴北山經少咸山敦水出焉東注於鴈門之水中多䰽䰽音沛或作鯆之魚食之殺人西山經剛山之尾雒水出焉北流注於河中多蠻蠻之魚其狀鼠身而鱉首音如吠犬王會揚州獻禺禺之魚按相如賦禺禺魼鰨郭璞云即比目魚倮蟲魚竊人形號貴賤皆備水國塵寰易地一視北山經龍侯山決決之水出焉東注於河中多人魚狀如䱱四足音如嬰兒食之無癡一作瘕疾又竹山竹水出焉熊耳之山浮濠之水出焉陽華之山楊水出焉朝歌之山潕水出焉其中皆多人魚陶𢎞景云人魚膏燃之不消秦皇驪塜所用人膏是也乾道六年湖州市口弄蛇客養一魚於瓦盆狀如鮎而腹黑下出兩手若人狀十指皆具亦人魚也䱱釋名人魚又名孩貌魚按孩兒魚有二種生江湖中形色皆如鱣鮠腹下翅形似足其腮頰軋軋音如兒啼即䱱也一種生溪澗中形聲皆同但能上樹乃鯢魚也又名魶魚見范蜀公志稱按郭璞云鯢魚四腳前腳似猴後腳似狗大者長八九尺冦宗奭云䱱形微似獺四足腹重墜如囊身微紫色無鱗嘗剖視之中有小魚小蟹小石數枚也雜俎梵僧普提勝説異魚東海漁人言近獲一魚長五六尺腸胃成胡鹿刀塑之狀號秦皇魚述異記釣洲有一陂陂之中有范蠡魚昔范蠡釣得大魚烹食之小者放於陂又云和州歷陽淪為湖今湖中有明府魚奴魚婢魚一統志臨海出望潮魚一名海和尚海內北經東洋大海有和尚魚狀如鱉其身紅赤色從潮水而至志重慶東南二百五十里有魚池流合􅡵江圖經云嘗有神魚遊此世傳巴子魚也養魚經蝦虎之魚類土附而腮紅若虎善食蝦俗謂新婦之魚區别魚形色不一難以類求或地待顯或因地收何必淵羡展卷與遊朝野僉載峰州有一道水從吐蕃中來夏冷如氷雪有魚長一二寸來去有時人取烹之而食千萬家取不可盡不知所從來名峰州魚雜俎興州有一處名雷穴水常半穴每雷聲水寒穴流魚隨流而出百姓每候雷聲繞樹布網獲魚無限非雷聲漁子聚鼓擊於穴口魚亦輒出所獲半於雷時人呼雷穴魚韋行規作興州刺史書此事移親故云晉吳𨽻為魚塞於雲湖有大魚化人語𨽻云曉有大魚攻塞切勿殺𨽻許之須臾有大魚至羣魚從之𨽻同侶誤殺大魚是夕風雨冥晦魚悉飛上木間因號飛魚徑在九江城西二里宋天聖中丁少連侍母觀網魚得大鯉命烹之庖人驚報魚頂生角魚已濵死少連祝曰魚若變化分當再活試以水圉圉如初遂放於清石潭盧載作送角鯉文因以名池在醴陵縣東東湖魚産南昌其湖水清魚美宋徐俯詩東湖春水百魚金是也又曲江魚此魚食金花水其味美又南川九遞山下有水瀦為池中産異魚人不敢取名九遞魚鰱水源出淩江其流會於保水春多鰱魚在南雄西十里鯉魚潭水深碧中有異魚如鯉人取而烹食之則化水在瓊州澄邁縣南五十里又魚爺井水極清洌相傳泉與海通中有一大魚頭白俗呼魚爺呼之輒出在文昌縣西宋景公食善星文有淇漳之鱧中山經有崌山江水之䲀足魚鱗鬛發發浮空若跋名異形殊乳洞濡沫魶􅀈􅀈鰌從類槩括建同浮胡推之愈濶北户録全義嶺表録異作金義嶺之西南有山曰盤龍山有乳洞洞有金沙龍盤魚皆四足修尾丹腹狀如守宮遊泳水濵人莫敢犯按御覽云龍蟠山有石洞洞中小水有四足魚皆如龍形人殺之即風雨也然唐韻云鰨魚四足䱱鯢别見但未見言其可致風雨耳公路因思道書説五頭魚三足麂皆神化所致不可以類而推也榮經水及西山溪谷出魶魚有足能緣木聲如兒啼蜀人食之山經樂遊山桃水出焉中多䱻音骨與音滑者不同此魚狀如蛇而四足是食魚疑即􅀈篇海􅀈音役魚有四足梧州放生池中多鰌魚有四足死後頭骨牙齒朽落至五月後更生骨盡乃止此疑鱷類真臘國出建同魚四足無鱗鼻如象吸水上噴高五六丈又浮胡魚八足狀如鱔觜如鸚鵡宜興頤山潛虬泉幽深泓澄中有異魚四足能行率數嵗一出出必有水災色魚洪纎匪一五色備焉豈其水府染繢有權北户録歷澗潭有五色魚中山經景山睢水出焉中多文魚拾遺記鮌沉羽淵化玄魚時揚鬐振鱗橫遊波上見者謂為河精又瀛洲名環潭東有淵洞有魚長千丈色斑鼻端有角時鼓舞羣戲逺望水間有五色雲就視乃此魚噴水為之慶雲之麗無以加也裴晉公謂門人曰吾死無所繫但午橋莊松雲嶺未成軟碧池繡魚尾未長漢書未終篇為可恨耳元志廣州有赤魚又韶州府東南五十里溫泉中時見赤魚遊泳人不敢捕昌化縣西北千頃山有龍湫魚皆金銀色禱雨多應昆陽平定鄉小山下有三洞泉出會而為潭中有青白大魚俗呼隨龍魚人不敢獲粵西陽朔縣西十五里有異魚塘中有魚緑鱗而紅鬛劒州普安廢縣浴丹池唐杜光庭浴丹之所池有魚赤鬛色如金飛躍其中或探取必觸風雨之變器形魚鋸笄鞘鏡以形似名斗拌筆管亦詭厥生腦金抱石無忝别旌寰宇記惠州出鋸魚亦名狼籍魚身長二丈口長三尺廣三寸左右齒如鐵鋸南越志作蜛魚漁書云鋸魚生大海中不多見其牙齒長五六尺兩傍如鋸齒故名漁人云此魚惜齒齒挂於網則身不敢動恐傷其齒諺謂千斤之鋸命懸一絲是也笄魚色白如笄長尺餘又一種越王笄大如笄白色生海邊池中見即取之可得少待則入土中矣鮹魚出江湖形如馬鞭尾有兩岐如鞭鞘因名雜俎濟南郡東北有鮦坑相傳魏景明中有人穿井得魚大如鏡其夜河水溢入此坑坑中居人皆化鮦又異物志南方鏡魚圓如鏡南越志石魚形圓如七斗拌又君魚長三寸背上骨如筆管大者似口逢諸細魚及黿皆斷之博物志金魚腦中有麩金出功婆塞江吉安龍泉縣小江出抱石魚又太原保德州出石花魚異同魚波食欣賜逐侶而遊形味互似豈亦賁優首句見關尹子南越志真魚如織杼魚又云織杼魚如真魚背上正青又寄魚長三寸似白魚常附海船以濟洪波一曰寄載魚又􅲭魚似􅱈䱝尾上有刺如檔樹刺也􅀈魚似蛇長一丈􅺗魚似鱉無甲有尾口在腹下土人呼為䟫魚又謂之鑊蓋魚取其形似有蠆尾世言螫人劉姓輒死他不皆然當是惡業所感􅀈海魚似鯿肥美鰬魚似鱓相如賦鰅鰫鰬魠音齊魚出漢水似鯉而小鱌魚似魟色白鼻長羽鮮魚禽易化不隔天淵今之似者應諡羽鮮山海經子桐山子桐之水出焉西注餘如之澤中多䱻音滑肉狀如魚而鳥翼出入有光音如鴛鴦見則大旱青箱雜記海有魚虬尾似鴟用以噴浪則降雨漢柏梁災越王上厭勝之法乃大起建章宮遂設鴟魚之像於屋脊以厭火災即今世鴟吻是也惠州志黃雀魚常以八月化黃雀十月後仍入海化魚廣州元志有鳯尾魚安南嘉興州蒙縣龍門江漢書封溪縣隄防龍門水即此傍有穴多出鸚鵡魚色青緑口曲而紅似鸚鵡相傳此魚能化龍云象山縣西東攝潭舊潭中産魚龜其甲尺許觜如鸚鵡尾長八九寸鱗甲炯然亂壙魚不𨽻毛王詭來水族良惡性同無傷並育肇慶志陽江縣江中有潛牛形似魚能上岸與牛鬬角軟還入水堅則復出廣志東海有馬鰍魚或云馬交南越志鼠魚頭似鼠文登志縣北海中有海驢常以八九月上島産乳其皮水不能潤可以禦雨又海狸亦上牛島産乳逢人則化魚入於水雜俎象浦有馬頭魚色黑長五丈餘頭如馬伺人入水食之又周陵溪中有魚其頭似羊俗呼羊頭魚豐肉少骨殊美於餘魚海豚腦上有孔噴水直上百數為羣人先取其子繫水中母自來就取之河豚無頰無鬐觸之則怒氣滿腹江豚鼻中作聲出入水上舟人候之知風雨南方物狀水豬魚似豬形異魚圖贊補卷中
