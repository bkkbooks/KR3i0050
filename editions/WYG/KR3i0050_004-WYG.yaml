body:
  text: 摩竭大魚摩竭大魚罟師莫干瀛淵角鼻可與齊觀四分律云摩竭大魚長三百由旬極大者長七百由旬智度論云昔有五百估客下海採寳值摩伽羅魚王開口見三日出白山羅列一是實日兩是魚眼海多贊缺王照新志宋嘉祐末有人攜一巨魚入京師能作人言號曰海多衒耀市井間亦嘗召入禁中自誦云海多風錯被漁人下網打住將在帝城中每日敎言語甚時放我歸去龍王傳與這底思量爾千回萬度後經李氏園中躍入池不可復獲是嵗黄河大決靈怪集吳郡漁者張胡于太湖釣得一巨魚腹上有丹書云九登龍門山三飲太湖水畢竟不成龍命負張胡子海魚逸品總贊凡二十種海實魚府巨細紛游色味異系漁書是収鱠楯鱠之大者狀楯得名脯同嚼蠟市肆攸輕烏頰赤鯮二魚異産形味稍同色羣可辨或釣或罿烏頰身㣣側視之則稍員厚鱗少骨多處水崖中漁人以釣得之色近黑􅆃上有刺數十枝長二三寸或亦藉此以防患者赤鯮一名交鬛似烏頰而稍短結陣而至大小交錯因名交鬛色淺絳故又名赤味不下烏頰黒赤之分衆寡之異小者名紅翅葢其子也􅴊魚身長骨弱性不樂羣豈懲鯧狎出處峻分􅴊魚首圓鱗細身長骨弱大者數十觔或云性徤不與諸魚為羣故名􅴊雜書云鯧魚無定耦與衆魚狎帶魚佩帶誰遺皚如曵練竒其説者原始僊媛帶魚生湥海中濶二三寸長可數尺色白如銀無鱗刺骨中有珠者名珠帶小者名帶絲皆因其狀似而名或云西王母渡東海侍女飛瓊腰帶為大風所飄化此魚竹魚竹魚條生博二寸許色奪浮筠寒食斯取貫尖無唇疑其黨與水棍松魚沙姜魚贊缺祭與赤魚同類而異名五鬚者為松三鬚者為赤而赤殊勝云沙姜魚身圓有鱗而白肉厚無刺呼為飼子飰以其無骨便食但未免肉相耳鰮魚波郎青鱗聚族雖三羣游則一海若拯貧結夏可必鰮魚身圓鱗厚長數寸波郎無鱗刺五六月間多結陣而來多者一網可售數百金漁人望海為田此其一也青鱗似鰮而薄至亦結羣天若以海利私此窮人者黄雀白雀飛躍貿形味隨氣革昊頊乘權術􅃷黄白黄雀似箬葉而薄色黄異苑云魚以八月化為雀花魿娘哀花魿身紋娘哀􅆃刺徑寸厥形醢供遠致花魿大寸許上下身薄有花紋娘哀􅆃上有刺漁人或受其螫痛不可忍因致母戚故名形似魿而無花大如指皆可作醢行于四方魢魚孟貢産魢夷羞是供力反彎薑功配鹽龍滇程記雲南百夷中有小孟貢江産魢魚彼夷食之日御百婦故夷性極滛貴賤俱數妻山中亦産彎薑餌一刀圭終其世斷絶人道土人以飼牡馬不之宦也何春逺渚紀聞宋徽宗時將軍蕭注破南蠻得其所養鹽龍長尺餘藉以銀盤中置玉盂以玉箸摭海鹽飼之每鱗中出鹽則収用酒送一匕專興陽道􅫀魚比鯽則大膚縷玉瑩以膾諸庖無異雋永原贊宋祁益州方物畧云􅫀魚出蜀江背鱗黑而膚理似王蜀人以為膾味美石鼈魚鯫鱗幺質本不登俎以味見録雖細猶捕原贊方物略云石鼈魚似䱀䰲而小上春時出自石間庖人取為竒味魶魚或云卽蝦有足若鯢大首長尾其啼如嬰緣木弗墜原贊方物略云魶魚出西山溪谷及雅江狀似鯢有足能緣木其聲如兒啼蜀人豢之范鎭東齋筆錄蜀有魶魚善緣木有聲如啼孟子言緣木求魚是亦未聞此也江蟯介屬根植其名江蟯殻分碧瓣肉緣素毫漁書江蟯生海泥中殻如花瓣而緣有根直植于泥白如豆芽殻軟肉邊有毛而白海味之佳者漳之詔安湖之海門皆有之郡中以為珍羞􅸔漳海泥􅸔生繁質小種異蚶田霜候枯槁漁書泥􅸔似蚌而小惟漳浦詔安海中産焉不種而生采之不竭大不盈寸鮮作湯佳七八月間為盛霜降則枯矣晒肉為米可藏乆用鹽連殻淹之可致遠沙蠶土穿沙蠶類蚓味甘登俎别種土穿汁凝盛暑漁書沙蠶一名鳯腸似蚯蚓而大生於海沙中首尾無别穴地而處發房飲露未嘗外見取者惟認其穴荷挿捕之鮮食味甘脯而中俎又一種名土穿生海泥中比沙蠶畧大其尾小六月煑之堅如凍漳浦雲霄多有之蠡史曰沙蠶無筋骨之强爪牙之利穴沙吸露尚不免見食於人者以味美也近聞有捕蟬食者亷而受殃口腹何厭之有土穿六月汁可成凍以視越中蓴菜四五月葉下有霜皆造物之至竒不隨俗炎凉者也半體魚廣武山麓漢高殿前有井八角三魚泳旃其一半體云昔烹鮮刳腹圉圉新録攸傳陶朱新錄河南廣武山漢高皇廟在其麓殿前有八角井曰漢泉井中有三魚一金鱗一黑鱗一如常而半體鱗肉與骨皆無獨其首全與二魚並游水中但其游差緩不復有揚鬛撥剌之勢觀者憑欄俯窺雖異之而猶未審一日有墮井者因濾之遂得三魚鱗色如在水中時半體者五内皆無方大異之後復置井中至今三魚尚存俗傳漢高皇食膾庖人治魚及半而楚軍至倉皇棄井中而遁語雖難信肰以刳魚而游泳亦可怪也毬魚朱崖之㵝有物鞠如貎形正號厥味雋腴宋范正敏遯齋閒覽海中異物不知名者甚多世人大抵以狀名之朱崖之傍溪有物正如鞠大小質狀無異亦有紋如線緣味極肥美土人但呼為毬魚異魚圖贊補閏集
