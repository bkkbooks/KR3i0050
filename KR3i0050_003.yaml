body:
  text: 異魚圖贊補卷下明胡世安撰互錯部黿介蟲之元升沉隨月以其類求僴然雄鼈作梁夏周脂可爇鐵子公染指遂成鄭孽爾雅翼黿似鼈而大南人亦捕食之濶至一二丈介蟲之元也鼈以為雄故黿鳴而鼈應淮南子燒黿致鼈此以其類求之一云黿大於鼉朔望隨月浮水月沉則沒此屬隂也拾遺記禹濟巨海黿鼉為梁又紀年周穆王東至九江叱黿鼉為梁而履之埤雅黿亦思化其脂得火可以然鐵張鼎云其脂磨鐵則明楚人獻黿於鄭靈公子公之食指動謂子家曰必嘗異味及宰夫烹黿食大夫不與子公子公染指於鼎嘗之而出五雜組殺黿割肉縣桁間見無人便自垂至地聞人聲即縮黿肉刲盡而留腸屬於首數日不死鳥攫之仍為所嚙鼉鼉狀守宮亦名土龍吐水向日鳴即雨從力攻碕岸樹鼓逢逢其枕瑩潔卵至盈胸就穴掘牽人不易蹤説文鼉狀如守宮長一二丈文五色背毛有鱗甲如鎧能吐雲致雨身具十二肖肉蛇肉最後在尾皮堅厚宜冐鼓本經名鮀魚一名土龍其甲黑色能横飛不能上騰夜鳴應更呉越謂之鱓音陀更向日吐水日沉則沒此屬陽也埤雅云欲雨則鳴舊云性嗜睡目常閉力尤酋徤善攻碕岸詩鼉鼓逢逢夏小正剝鼉以為鼓陶𢎞景云惟至難死沸湯沃口入腹良久乃能剝之李斯傳樹靈鼉之鼔晉安海物記鼉宵鳴如桴鼓今江淮間謂鼉鳴為鼉鼓陳藏器云人於穴中掘之百人掘須百人牽一人掘亦一人牽不然終不可出李時珍云穴極深漁人以篾纜繫餌探之候其吞鈎徐徐引出其瑩潔勝於魚枕生卵甚多至百亦自食之南人珍其肉以為嫁娶之敬龜𤣥衣督郵質應離象星㪚瑤光前知幽貺古今注一名𤣥衣督郵一名洞𤣥先生一名冥靈甲曰神屋又號先知君抱朴子山中已日稱時君者龜也李顒賦質應離象位定坎居按易離為龜春秋運斗樞瑤光星㪚為龜事類賦伊神龜之效質實瑤光之㪚精説苑靈龜文五色似玉似金背隂而負陽上隆象天下平法地槃衍象山四趾轉運象四時文著象二十八宿蛇頭龍脛左睛象日右睛象月千載之化下氣上通能知存亡吉凶之變天生神物十朋之龜或游於火或游於蓍雖云類殊象二一歸亹亹致用極數盡幾郭璞贊漢書元龜距形尺二寸直一千一百六十為尺貝十朋公龜九寸以上直五百為壯貝十朋侯龜七寸以上直三百為公貝十朋子龜五寸以上直百為小貝十朋為寳四品孫氏瑞應圖龜生三百歲遊於蕖葉之上三千歲尚在蓍叢之下爾雅十曰火龜注猶火鼠類又抱朴子千歲之龜五色具焉額生兩骨起似角解人語或浮蓮葉之上或在叢蓍之下其上時有白雲龜甲蟲之長外骨内肉腸屬於首能運任胍廣肩大腰思抱其息以耳雌雄尾交亦與蛇匹靈而多夀能賁鼈三足曰能龜三足曰賁食之已蠱腫産於從伊濆爾雅鼈三足者曰能龜三足者曰賁山海經從水多三足鼈食之無蠱又大若山陽狂水出焉注於伊中多三足龜食之可以已腫姚福庚已編大倉民家得三足鼈烹食畢入臥少頃形化血水止髮耳鄰人疑其婦謀害訟之官時令黄廷宣鞠問不決乃别取三足鼈令婦如前烹治取死囚食之入獄亦化如前人遂辨其獄竊謂能之有毒不應如此然理外事亦未可臆斷也而山海經云云近亦有誤食無恙者何哉大明會典暹羅獻六足龜宋史趙霆獻兩頭龜此又前人所未知者也多目龜星池神龜爰有六眸或四或八塵食濁游拾遺記星池千里池中有神龜八足六眼背負七星日月八方之圖腹有五嶽四凟之象時出石上望之煌煌如列星江賦有鼈三足有龜六眸劉宋太始二年八月四眼龜見㑹稽六年呉興獻八眼龜齊永明五年六月建城獲四目龜八月延州獲六目龜梁天監五年四月始豐獲八目龜唐書江州獻六眼龜鼈穹脊周裠目聽思化九肋稱良一足堪訝神守在池龍誘可謝本草鼈水居陸生穹脊連脇與龜同類四緣有肉裠裹甲無耳以目為聽純雌無雄以蛇及黿為匹卵生思抱其行蹩躠故謂之鼈俗呼團魚因形圓也鼉一鳴而鼈伏遇蚊叮則死得蚊煮則爛而熏蚊者復用鼈甲物相報復如此之異段成式云甲蟲影伏鼈伏於淵而卵剖於陵此思化也九肋者勝目白腹下天字者不可食摭言袁州盧肇答人云正如沅江鼈甲九肋者稀白澤圖一足鼈池精名髮頊養魚經魚滿三百六十則龍為之長而引飛出水内鼈則魚不復去故一名神守一名東明一名河伯從事蟹鶻眼鱟足䖱腦蜩腹流止色殊雌雄異錄敗漆集鼠膏金髓玉執穗朝魁無膓仄亍傅肱蟹譜總論云蟹水蟲也亦曰魚屬以其外骨則曰介蟲取其横行目為螃蟹鶻眼蜩腹䖱腦鱟足其抵類拳丁其螯類執鉞其跪又皆外刺性復多躁或編諸繩縷或投諸笭箵則引聲噀沫至死方已類皆䲊育生於濟鄆者其色紺紫出於江淛者其色青白小者謂之蟛蚏中者謂之蟹匡長而鋭者謂之䗻大者謂之蝤蛑雖皆有佳味獨蟹參於藥論耳明越溪澗石穴中亦出小蟹其色赤而堅俗呼為石蟹與生伊洛者無異厴圓多腴而奪之􅚺臍長多足其生於盛夏者無遺穗以自充止食茭蘆根俗呼為蘆根蟹瘠小而味腥至八月則蜕而形浸大秋冬之交稻粱已足各腹芒走江俗呼樂蟹最號肥美由江而納其芒於海中之魁遇氷雪則自伏淤涰不可得矣今人設㗖具以按酒者特先置焉何曽食疏𢎞君食檄虞悰食品未必不珍此味也悰南史有傳但名存而書亡此為恨耳陸龜蒙蟹志云執穗而朝其魁不近於義耶捨沮洳之江海自微而務大不近於智耶外剛躁而無他腸不近於正耶其見稱如此本草蟹性多躁引聲噀水至死乃已生於流水者色黄而腥生於止水者色紺而馨佛書言其㪚子後即自枯死霜前食物故有毒霜後將蟄故味美雨航雜錄蠞即蟹也經霜後有赤膏曰赤蟹無膏曰白蟹始穴沮洳稻熟時及出各執一穗朝其魁或曰以輸海神入江則稍大入海益大廣雅雄曰􅀈䱺雌曰博帶雜俎其腹毛能殺人性能敗漆燒之致鼠凡蟹漆相合則化為水服之長生是物以解結㪚血得名惟霜後可食餘節食之多致疾故有蠞名孕婦猶忌獨目獨螯四足六足兩目相向皆有大毒不可食爾雅翼隨潮退殻潮退徐行泥中者名攤塗在蠣殻中為蠣取食者名蠣奴皆蟹之族皮日休詩蟹因霜重金膏溢羅鄴詩肌膚未解黄金甲骨髓常留白玉香八跪二螯外骨内肉殻上多作十二㸃深胭脂色其腹中虚實亦應月大者箱角兩出足節屈曲行則旁横故里語稱螃蟹陸佃云圓臍者牝尖者牡也性走明漆見之輒解名蟹似出乎此或曰此物之來秋初如蟬蜕故名蟹譜蟹之類隨潮解甲更生新者故字从解抱朴子山中辰日稱無腸公子者蟹也埤雅梓人注仄行蟹屬蝤蛑蟹有蝤蛑其力撥棹兩螯無毛隨潮退殻扁而最大後足濶者蝤蛑雨航雜錄南人謂之撥棹子言力可撥棹隠居云以後脚形如棹也蟳乃蝤蛑之大者隨潮退殻一退一長其大者如升小者如盞楪兩螯無毛所以異於蟹埤雅蝤蛑大者螯力敵虎是也爾雅翼蝤蛑大者長尺餘兩螯強能與虎鬬其大而有虎斑文隨波湮淪者名虎蟳五雜組蝤蛑大者如斗俗名曰蟳其螯至強能殺人捕之者伸手石罅中為其所鉗牢不可脱一遇潮至便致淹没即至小者亦鉗人出血其肉肥大於蟹而味不及也漁書蟳一名黄甲蟹生海岸中殻圓而滑後脚有兩葉如棹而濶其螯無毛穴處石縫中慣捕者徧尋其穴而得故名蟳足善走漁人得之即以草緊繫而藏之簍當潮至時雄在簍中亦引聲沸沫嶺南人謂之撥棹子一名蝤蛑余鄉蟳有一二尺大殻可作花盆汲冢專車之殻必此類然蟹勝蟳蟳勝蠘故陶榖云一蟳不如一蟹虎蟳蟹有虎蟳蹣跚而行猙獰斑爛遂冐虎名雨航雜錄大者有虎斑文濶足亦如蟳嶺表録異虎蟹殻上有虎斑可裝為酒器與紅螺皆産瓊崖海邊雖非珍竒亦不易採得也敬美閩部疏海中蟳有冬春間生者蝤蛑類也而色瑪瑙斗殻作猙獰斑斕畫似虎頭土人名之曰虎蟳余以配龍蝦為的對也五雜組殻斑如虎頭形它方人多取作翫器而味彌不及蟹矣漁書云蟳小者不結黄惟深海産者其黄與秋蟹冬蠘一同名為紅蟳食品重之又有石蟳虎獅蟳狀如獅頭彭蜞小則有螠大則竭朴惟兹彭蜞與螖混錯不熟爾雅幾死勸學因兆相如赦炰於卓雨航雜錄螠似彭蜞而小竭朴大於彭蜞黒斑有文以大螯障日以小螯食彭蜞似蟹有毛而赤性極寒漁書二螯並者為彭蜞生海泥中食土大僅盈寸一名長卿爾雅注彭蜞亦螖類晉書蔡司徒謨初渡江見彭蜞大喜曰蟹有八足加以二螯令烹之旣食吐下委頓方知非蟹後向謝仁祖説此事謝曰卿讀爾雅不熟幾為勸學死按大戴禮勸學篇蟹二螯八足非蛇鱣之穴無所寄託者用心躁也古今注彭蜞小蟹生海邊泥中食土一名長卿按成都故事王吉夜夢一彭蜞在都亭作人語曰我翌日當舎此吉覺而異焉使人早候見司馬長卿至吉曰此人文章當横行一世因呼彭蜞為長卿卓文君一生不食彭蜞數丸介蟲數丸形亦似蜞丸土三百潮信與期五雜俎數丸生海邊形似彭蜞取土作丸數滿三百而潮至人以為候因名常在海沙中一曰沙丸有青脚白脚二種爾雅翼南海之物感應經蟹屬名彭蚏以螯取土作丸從潮來至潮去或三百丸因名三百丸百足蟹善宛貢蟹百足四螯煮殻成膏勝鳯喙膠述異記善宛國貢一蟹長九尺有百足四螯因名百足蟹煮其殻謂之螯膠勝於鳯喙膠并見雜俎䘂行氣尠毒莫佳於䘂肉殻多黄螯最利銛陶隠居云蟹未被霜者甚毒以食茛故也然族類最多六足名跪四足名比皆有大毒濶殻而多黄者名䘂其螯最鋭斷物如芟刈焉五雜組殻兩端鋭而螯長不螯俗名曰䘂在雲間名曰黄甲雨航雜錄䘂肉殻多黄食之行風氣造化權輿龍易骨蛇易皮麋鹿易角蟹易螯拆其螯足後復更生䘂漁書作蠘云海蠘蟹屬甲廣兩角尖利螯長數寸無毛端有兩牙如剪刀遇物截之則斷故名螯有花文生時色綠熟則變紅殻有白花如繪肉白膏赤味不下於蟹解甲虚實亦與蟹同名有數種各以類聚漁人網取輒盈車舟五六月間鄉人空手入水探之隨取隨得作醢為佳螯則另聚而鬻之以為上羞作脯亦佳有冬蠘花蠘黄蠘青脚蠘三目蠘四時皆有形多相似惟文色差别時候不同耳大者盈尺小者不下二三寸臍下之子宜膾蝦蝦代蛇睇亦兆兵歲須可杖簾尤繁厥系水母目蝦詳前又蟹譜呉俗有蟹荒蝦兵之語以其披堅執鋭也歲或暴至則鄉人以為兵證爾雅鰝大蝦出海中者長二三丈游行則竪其鬚高於水面故字从高鬚長數尺可以織簾嶺表錄異劉恂曾登海舶入䑨樓忽見牕板懸二巨蝦殻頭尾鉗足具全各七八尺首占其一分觜尖利如鋒刃觜上有鬚如紅筯各長二三尺雙脚有鉗鉗麤如人大指長二尺餘上有芒刺如薔薇枝赤而銛硬手不可觸腦殻烘透彎環尺餘何止於盃盂也北户録滕循為廣州刺史有客語循曰蝦鬚有一丈者堪作拄杖循不之信客去東海取鬚四尺以示循方伏其異交廣記呉有廣州刺史語滕修蝦鬚長一丈不之信其人後至東海取蝦鬚長四丈四尺封以示修一事而載小異又交趾蝦巨如柱鬚長七八尺者海濵以作拄杖甚佳陳剛中詩蝦鬛作笻杖廣韻蝦魚屬閩中有五色蝦梅蝦盧蝦泥蝦苗蝦又海中有管蝦梅蝦數千萬尾不及斤五六月間生一日可滿數十舟色白可愛泥蝦可為醬并苗蝦皆極細不可辨五雜組呉越王宴陶榖蝦自龍蝦至線蝦計亦不下三十餘種按龍蝦大者重二十餘斤鬚三尺餘可作杖漁書云龍蝦一名蝦魁其首如龍有刺眼如蟹而大睂上起二角鬚長數尺兩傍共十脚脚末有爪爪上有毛徑寸黄金色負介昻藏體似小龍大可二三斤色綠碧炊熟硃紅鬚紅白相間味絶甘美鮮食尤佳出閩之𤣥鍾銅山間海蝦名最多黄蝦每兩相挿成對有金鈎班節沙蝦劒青尾之類又有蝦姑蝦候各種雖不中俎皆蝦族也溪澗中亦有多産其大者産婦食之有乳鄉人呼為狗蝦躶步螺名躶步負殻露行卵著石軟取輒堅貞浮於海際兆世昇平拾遺記有大螺名躶裸同步負其殻露行冷則復入其殻生卵著石則軟取之則堅明王之世則浮於海際焉寄居鸚鵡外遊有蟲寄居益顔美志火炙出逋味蝦形鼄以匹鱆魚異苑鸚鵡螺形如鳥常脱殻而遊朝出則有蟲類蜘蛛入其殻中戴以行螺夕還則此蟲出一名􅀈庾闡所謂鸚鵡外遊寄居負殻也按此螺出肉為魚所食則殻出浮人因取作杯陶𢎞景云寄居蟲益顔色美心志南州異物志寄居之蟲如螺而有脚味似蝦形如鼄本無殻入空螺中戴以行觸之縮足如螺閉户也火炙之乃出走又一種寄居蟹名蠣奴居蚌腹按孫愐云寄居在龜殻中者名曰蝞則寄居亦非一種王敬美閩部疏前人於海味最重鱆魚及寄生鱆魚即浙之望潮也形雖不雅而味美於烏賊寄生最竒海上枯嬴殻存者寄生其中戴之而行形味似蝦細視之有四足兩螯又似蟹類得之者不煩剔取曵之即出以肉不附也炒食之味亦脆美天地何所不有海朮南海水族有瑰其質前足左長右齒比櫛左取右嚙乃充口實大三尺餘其聲朮朮酉陽雜俎南海有水族前左脚長右脚短口在脇旁背上常以左脚捉物置於右脚右脚中有齒嚙之方内於口大三尺餘其聲朮朮南人呼為海朮海扇厥物甲形類箑俟花朝潮力乏張輪渠與波狎製杯盛醪雖滿猶匣即車渠韻㑹云海中大貝背上壟文如車輪之渠故名車溝曰渠耳劉積霏雪錄海扇海中甲物也其形如扇背文如瓦屋三月三日潮盡乃出梵書謂之牟婆各揖拉婆李時珍云大蛤也大者長二三尺濶尺許厚二三寸殻外溝壟如蚶殻而深大皆縱文無横文也殻内白晳如玉亦不甚貴畨人以飾器物李珣謂玉石類西國七寳之一葢玉石中亦有車渠而此蛤似之耳沈存中筆談車渠大者如箕背有渠壟如蚶殻以作器緻如白玉楊升菴丹鉛錄車渠作杯注酒滿口一分不溢試之果然􅒕䗯􅒕䗯似蛤薄橢毛殻名所從旌有前無却雨航雜錄􅒕䗯似小蛤而長匾殻有毛是物行有前無却故名宗奭云順安軍界河中亦有之與馬刀相似肉頗冷人以作鮓食不堪致逺蜆蜆亦蚌屬能以殻飛别呼扁螺啓似朝暉陳藏器云蜆處處有之小如蚌異色能候風雨以殻飛李時珍云蜆睍也殻内光耀如初出日采也隋書劉臻父嗜蜆呼為扁螺蟶蟶生海泥可以田種或配淡菜細臛是供氣味甘温補虛導壅海味索隠贊其形如淡菜而其堅也閣閣其肉如蝦蛤而其味也泊泊即不謂之腥鯖亦可謂之肉臛固不尊之為大嚼亦可稱之為細鰐悠悠獨酌三嗅而作陳藏器云蟶生海泥中長二三寸大如指兩頭開李時珍云海中小蚌其形長短大小不一與江湖中馬刀􅒕蜆相似其類甚多閩粤人以田種之候潮泥壅沃謂之蟶田呼其肉為蟶腸漁書蟶蛤屬而大小不同殻薄而長肉中有髻有長鼻宜鮮食亦可為脯有名竹蟶者長一二寸如小竹管然大者廣一二寸長十之生深海中有名丘望者以地名二三月間最肥味淡而爽與蛤相伯仲嘉祐本草蟶補虛煮食去胸中邪熱煩悶飯後食之與服丹石人相宜治産後虚損土鐵殻如月哉生魄肉如鐵新凝液梅雨時收南産腴澤海味索隠土鐵歌土非土鐵非鐵肥如澤鮮如屑年來産自寧波城看時却是嘉魚穴盤中箇箇瑪瑙烏席前一一丹丘血見者嘗飲者蘖舉杯喫飯兩相宜猩猩不惜廣長舌屠本畯云土鐵一名泥螺出南田者佳五月梅雨收製三呉士人酷嗜土鐵者謂不但喫飯飲酒即㸃茶亦妙予嘗舉以為笑土肉海豐土肉大如嬰臂卅足笄影五官不備一統志土肉色黑大如小兒臂長四五寸有腹無口目有三十足如笄簪出海豐縣大海中西施舌獷殻如頤肉舚舕而化自鷾鴯久復差池既儷女施亦方男儀惟其似之是以謚之雨航雜錄西施舌一名沙蛤大小似車螯而肉自殻中宇出長可二寸如舌温州公嘗與人食此戲曰西施舌如此亦不足美其人曰非也舌若能搬弄可稱張儀舌是物海燕所化久復為燕其性熱漁書云西施舌狀如蚌殻色青綠肉作銀紅似女子舌故名味清甘有致作湯佳味海參爰有海參産於遼海以配海蜌牝牡形在功敵人微名因不改五雜組遼東海濵有之一名海男子其狀如男子勢然淡菜之對也其性温補足敵人參故名人參一名人微沙噀蠕蠕頑質縮如桃栗沙噀沙蒜名殊物一去涎糅辛味美無匹雨航雜錄沙噀塊然一物如牛馬腸臟頭長五六寸無目無皮骨但能蠕動觸之則縮小如桃栗徐復擁腫土人以沙盆糅去其涎腥雜五辣煮之脆美為上味樂清人名沙蒜石勃卒石屑胎來魚來形勃卒赬而隈膨腹兀兀互類竒侅雨航雜錄石勃卒形短圓三寸長四寸身赤腹泡急其形勃卒故名一名來魚或曰石屑入水所化周禮互物注謂有甲介者異魚圖贊補卷下
